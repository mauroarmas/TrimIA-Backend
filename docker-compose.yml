services:
  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trimia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trimia}
      POSTGRES_DB: ${POSTGRES_DB:-trimia}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trimia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trimia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trimia-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.20
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
    networks:
      - trimia-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      # N8N_HOST usa el nombre del servicio para que las URLs internas sean resolubles
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # WEBHOOK_URL es la URL que n8n usa para construir los webhooks hacia el exterior
      # En dev: localhost para que las URLs sean accesibles desde browser/Postman
      # En prod: reemplazar por la URL pública (ej. https://n8n.tudominio.com/)
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - trimia-net

  nestjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://trimia:trimia@postgres:5432/trimia
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - trimia-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  # paperclip:   <- Fase 5 / Administración
  #   image: ...
  #   ports:
  #     - "4000:4000"
  #   networks:
  #     - trimia-net
  #   depends_on:
  #     - nestjs

networks:
  trimia-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  n8n_data:
